# Site configuration — Fei Teng academic homepage
baseURL = "https://felixteng.github.io/"   # auto-overridden in CI to the real Pages URL
title = "Fei Teng"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true        # URLs are /en/... and /zh/...
enableRobotsTXT = true
enableEmoji = true

[params]
  author = "Fei Teng"
  # Name variants that get bold-faced in author lists (your name):
  selfNames = ["Fei Teng", "F Teng", "Teng F", "Teng, F.", "F. Teng", "滕飞"]
  email = "tengfei@tsinghua.edu.cn"
  phone = "+86-10-62784805"
  scholar = "https://scholar.google.com/citations?user=e31RArAAAAAJ&hl=en"
  photo = "img/teng-fei.jpg"
  # cvPdf = "cv/teng-fei-cv.pdf"  # TODO: drop a PDF in static/cv/ and uncomment

[markup]
  [markup.goldmark.renderer]
    unsafe = true            # allow raw HTML in markdown
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[languages]
  [languages.en]
    label = "English"
    locale = "en"
    weight = 1
    title = "Fei Teng"
    [languages.en.params]
      role = "Professor & Deputy Director"
      affiliation = "Institute of Energy, Environment and Economy, Tsinghua University"
      tagline = "Climate change · Energy policy · Integrated assessment modeling"
